<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dozera Bank X ICICI</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #f37021;
            --danger: #ff4d4d;
            --dark: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }

        .header {
            color: var(--primary);
            border-bottom: 2px solid var(--secondary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #002244; }

        #dashboard { display: none; }

        .balance-card {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .hacked {
            color: var(--danger) !important;
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(2px); }
            50% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form">
        <h2 class="header">Dozera X ICICI</h2>
        <p>Enter Account Number to Login</p>
        <input type="text" id="accInput" placeholder="778810620026-N">
        <button onclick="handleLogin()">Login to Secure Portal</button>
    </div>

    <div id="dashboard">
        <h2 id="userName">Welcome</h2>
        <div class="balance-card">
            <h3>Current Balance</h3>
            <h1 id="userBalance">$0</h1>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">Account Number: <span id="displayAcc"></span></p>
        <button style="background: #666; margin-top: 10px;" onclick="location.reload()">Logout</button>
    </div>
</div>

<script>
    // Mock Database
    const accounts = {
        "778810620026-N": { name: "Anmol Sunda", balance: 872 },
        "92792892602-N": { name: "Gursharan Singh", balance: 20720270279 }
    };

    function handleLogin() {
        const input = document.getElementById('accInput').value.trim();
        const loginDiv = document.getElementById('login-form');
        const dashDiv = document.getElementById('dashboard');

        // Check for the "M" trigger (Security Simulation)
        if (input.endsWith('-M')) {
            const originalAcc = input.replace('-M', '-N');
            if (accounts[originalAcc]) {
                startHackSequence(accounts[originalAcc]);
                return;
            }
        }

        // Standard Login
        if (accounts[input]) {
            showDashboard(accounts[input].name, accounts[input].balance, input);
        } else {
            alert("Account not found or invalid format.");
        }
    }

    function showDashboard(name, balance, acc) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userName').innerText = "Welcome, " + name;
        document.getElementById('displayAcc').innerText = acc;
        document.getElementById('userBalance').innerText = "$" + balance.toLocaleString();
    }

    function startHackSequence(account) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        const balanceDisplay = document.getElementById('userBalance');
        const userHeader = document.getElementById('userName');
        
        userHeader.innerText = "SYSTEM COMPROMISED";
        userHeader.classList.add('hacked');
        balanceDisplay.classList.add('hacked');
        
        let currentBal = account.balance;
        // Faster countdown for huge numbers
        const decrement = Math.ceil(currentBal / 100); 

        const interval = setInterval(() => {
            currentBal -= decrement;
            if (currentBal <= 0) {
                currentBal = 0;
                clearInterval(interval);
                balanceDisplay.innerText = "$0 (PERMANENT LOCK)";
            } else {
                balanceDisplay.innerText = "$" + currentBal.toLocaleString();
            }
        }, 50);
    }
</script>

</body>
</html>
